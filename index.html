<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>護理標籤智慧排版系統</title>
    
    <!-- 引入 JsBarcode 用於神秘版本的條碼生成 -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
    
    <style>
        /* ==========================================================================
           1. 螢幕操作介面樣式
           ========================================================================== */
        :root {
            --primary-color: #0056b3;
            --sicu-color: #6f42c1; /* 神秘版本使用紫色 */
            --success-color: #28a745;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --border-radius: 8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Microsoft JhengHei', sans-serif; background-color: var(--bg-color); padding: 2rem; }
        .app-container { max-width: 800px; margin: 0 auto; background: var(--card-bg); padding: 2rem; border-radius: var(--border-radius); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #333; margin-bottom: 1rem; font-size: 1.8rem; }
        textarea { width: 100%; height: 180px; padding: 10px; font-family: monospace; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 1.5rem; }
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 1.5rem; }
        button { padding: 12px; font-size: 15px; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; color: white; flex: 1; transition: 0.2s; }
        .btn-general { background-color: var(--primary-color); }
        .btn-general:hover { background-color: #004494; }
        .btn-mystery { background-color: var(--sicu-color); }
        .btn-mystery:hover { background-color: #59339d; }
        .btn-print { background-color: var(--success-color); }
        .btn-print:disabled { background-color: #6c757d; cursor: not-allowed; }

        #errorMsg { color: #dc3545; font-weight: bold; margin-bottom: 1rem; display: none; }

        /* ==========================================================================
           2. A4 列印矩陣樣式 (精確物理對齊與切割)
           ========================================================================== */
        #printArea { display: none; }

        @media print {
            /* 1. 設定紙張大小並強制消除所有瀏覽器預設白邊 */
            @page {
                size: A4 portrait;
                margin: 0; 
            }
            body { background: white; margin: 0; padding: 0; }
            .app-container { display: none !important; }
            #printArea, #printArea * { visibility: visible; }

            /* 2. 絕對定位與 CSS Grid 物理尺寸切割 */
            #printArea {
                display: grid;
                position: absolute;
                top: 0; left: 0;
                /* A4 寬度 210mm，分成 4 欄，每欄嚴格等於 52.5mm */
                grid-template-columns: repeat(4, 52.5mm);
                /* A4 高度 297mm，分成 14 列，每列嚴格等於 21.214mm */
                grid-template-rows: repeat(14, 21.214mm);
                /* 移除任何間距，完全依賴上述物理尺寸 */
                gap: 0;
                width: 210mm;
                height: 297mm;
                /* 若實體貼紙整張有偏移，可微調下方的 padding，例如上方偏 1mm 則加上 padding-top: 1mm; */
                box-sizing: border-box;
            }

            /* 3. 貼紙單元格：內容絕對置中對齊 */
            .label-cell {
                display: flex;
                flex-direction: column;
                /* 【對齊方式註解 1】 justify-content: center; 讓內容在垂直 Y 軸保持正中央 */
                justify-content: center; 
                /* 【對齊方式註解 2】 align-items: center; 讓內容在水平 X 軸保持正中央 */
                align-items: center;     
                width: 100%;
                height: 100%;
                background-color: white;
                /* 邊界保護：稍微向內縮 1mm，避免印表機誤差切到文字 */
                padding: 1mm;
                box-sizing: border-box;
                overflow: hidden;
            }

            .print-text {
                font-family: 'Microsoft JhengHei', sans-serif;
                font-size: 13px; /* 適當大小確保能塞入小方格 */
                font-weight: 900;
                line-height: 1.4;
                color: black;
                text-align: center;
                white-space: nowrap;
            }

            .print-barcode {
                max-width: 90%;
                height: 8mm !important; /* 強制控制高度避免撐開網格 */
                margin-top: 1px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>臨床標籤轉換系統</h1>
        <p style="color:#666; margin-bottom: 1rem;">將 NIS 資料貼入下方。通用版產生滿版 56 格純文字；神秘版僅產生 4 格含條碼與床號的標籤。</p>
        
        <textarea id="inputText" spellcheck="false">
01234567 劉秉勳
床號： SIU28
ID： A123456780
生日： 2000-08-15, 民國90年08月05日
81 years old male
血型： A , RH+ (2026/02/26)
首次就診日期：2014-08-24，</textarea>
        
        <div id="errorMsg"></div>

        <div class="btn-group">
            <button class="btn-general" onclick="processData('GENERAL')">轉換 (通用版 56格)</button>
            <button class="btn-mystery" onclick="processData('MYSTERY')">轉換 (神秘版 4格)</button>
            <button class="btn-print" id="printBtn" onclick="window.print()" disabled>列印標籤</button>
        </div>
    </div>

    <!-- 列印區塊 -->
    <div id="printArea"></div>

    <script>
        // 核心資料解析
        function extractPatientData(rawText) {
            const result = { mrn: "", name: "", bed: "", idNumber: "", dob: "", isValid: false };
            try {
                const lines = rawText.split('\n').map(line => line.trim());
                if (lines.length === 0) return result;

                // 擷取病歷號與姓名
                const firstLineParts = lines[0].split(/\s+/);
                if (firstLineParts.length >= 2) {
                    result.mrn = firstLineParts[0];
                    result.name = firstLineParts[1];
                }
                // 擷取床號
                const bedMatch = rawText.match(/床號[：:]\s*([A-Za-z0-9]+)/);
                if (bedMatch) result.bed = bedMatch[1];
                // 擷取身分證
                const idMatch = rawText.match(/ID[：:]\s*([A-Za-z0-9]+)/);
                if (idMatch) result.idNumber = idMatch[1];
                // 擷取生日
                const dobMatch = rawText.match(/民國(\d{1,3})年(\d{1,2})月(\d{1,2})日/);
                if (dobMatch) {
                    const yy = dobMatch[1].padStart(2, '0');
                    const mm = dobMatch[2].padStart(2, '0');
                    const dd = dobMatch[3].padStart(2, '0');
                    result.dob = `${yy}/${mm}/${dd}`;
                }

                if (result.mrn && result.name) result.isValid = true;
                return result;
            } catch (error) {
                return result;
            }
        }

        // 轉換與排版主邏輯
        function processData(mode) {
            const rawText = document.getElementById('inputText').value;
            const errorMsgBox = document.getElementById('errorMsg');
            const printBtn = document.getElementById('printBtn');
            const printArea = document.getElementById('printArea');

            errorMsgBox.style.display = 'none';
            printBtn.disabled = true;
            printArea.innerHTML = ""; 

            const data = extractPatientData(rawText);
            if (!data.isValid) {
                errorMsgBox.innerText = "資料解析失敗：無法辨識首行的「病歷號」與「姓名」。";
                errorMsgBox.style.display = 'block';
                return;
            }

            // 根據模式決定渲染數量與內容
            let cellCount = 0;
            const fragment = document.createDocumentFragment();

            if (mode === 'GENERAL') {
                // 通用版本：僅 病歷號/姓名/生日/身分證，共 56 格
                cellCount = 56;
                const line1 = `${data.mrn} &nbsp; ${data.name}`;
                const line2 = `${data.dob} &nbsp; ${data.idNumber}`;

                for (let i = 0; i < cellCount; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'label-cell';
                    cell.innerHTML = `
                        <div class="print-text">${line1}</div>
                        <div class="print-text">${line2}</div>
                    `;
                    fragment.appendChild(cell);
                }
            } 
            else if (mode === 'MYSTERY') {
                // 神秘版本：SICU專用，含床號與條碼，僅印一列(4格)
                alert("建議僅在SICU內使用");
                cellCount = 4;
                const line1 = `${data.bed} &nbsp; ${data.name}`;
                const line2 = `${data.mrn} &nbsp; ${data.dob}`;

                for (let i = 0; i < cellCount; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'label-cell';
                    
                    // 為了確保版面不亂，使用 svg 標籤接載條碼
                    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                    svg.id = `barcode-${i}`;
                    svg.className = 'print-barcode';

                    cell.innerHTML = `
                        <div class="print-text" style="font-size:12px;">${line1}</div>
                        <div class="print-text" style="font-size:12px;">${line2}</div>
                    `;
                    cell.appendChild(svg);
                    fragment.appendChild(cell);
                }
            }

            printArea.appendChild(fragment);

            // 若為神秘版本，補畫 Barcode
            if (mode === 'MYSTERY') {
                for (let i = 0; i < cellCount; i++) {
                    JsBarcode(`#barcode-${i}`, data.mrn, {
                        format: "CODE128",
                        width: 1.5,
                        height: 30,
                        displayValue: false, // 隱藏下方文字，節省高度
                        margin: 1
                    });
                }
            }

            printBtn.disabled = false;
            printBtn.innerText = `列印標籤 (${mode === 'GENERAL' ? '56格' : '4格'})`;
        }
    </script>
</body>
</html>
