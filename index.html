=============================================================================
[部署指南 - GitHub Pages]
1. 進入你的 sicu-label-printer GitHub 專案
2. 開啟 index.html，點擊右上角的編輯 (鉛筆圖示)
3. 將本段所有程式碼完全取代舊有內容
4. 點擊 "Commit changes"
5. 等待 1-2 分鐘後重新整理網頁，即可看到最新無條碼、滿版置中版本
=============================================================================
-->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SICU 臨床護理標籤轉換系統</title>
    
    <style>
        /* ==========================================================================
           1. 系統全域變數與基礎排版設定
           ========================================================================== */
        :root {
            --primary-color: #0056b3;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #6c757d;
            --border-radius: 8px;
            --transition-speed: 0.3s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Microsoft JhengHei', 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        /* ==========================================================================
           2. 螢幕操作介面樣式
           ========================================================================== */
        .app-container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .header-section {
            border-bottom: 2px solid var(--bg-color);
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
        }

        .header-section h1 { color: var(--primary-color); font-size: 1.8rem; margin-bottom: 0.5rem; }
        .header-section p { color: var(--text-muted); font-size: 0.95rem; }
        .input-group { margin-bottom: 1.5rem; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 0.5rem; color: var(--text-main); }

        textarea {
            width: 100%;
            height: 200px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 14px;
            padding: 12px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1);
        }

        .action-panel {
            display: flex;
            gap: 15px;
            margin-bottom: 2rem;
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: var(--border-radius);
        }

        button {
            padding: 12px 24px; font-size: 16px; font-weight: bold; cursor: pointer;
            border: none; border-radius: 4px; color: white; display: flex;
            align-items: center; justify-content: center; gap: 8px; flex: 1;
            transition: all var(--transition-speed);
        }

        .btn-convert { background-color: var(--primary-color); }
        .btn-convert:hover { background-color: #004494; transform: translateY(-1px); }
        .btn-print { background-color: var(--success-color); }
        .btn-print:hover { background-color: #218838; transform: translateY(-1px); }
        .btn-print:disabled { background-color: #6c757d; cursor: not-allowed; transform: none; }

        /* 預覽區塊設計 */
        .preview-section {
            border: 2px dashed #a5c8ed; padding: 20px; background-color: #f0f7ff;
            border-radius: var(--border-radius); display: none; animation: fadeIn 0.5s ease-in-out;
        }

        .preview-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; border-bottom: 1px solid #cce1f6; padding-bottom: 10px;
        }
        .preview-header h3 { color: var(--primary-color); margin: 0; }
        .status-badge { background-color: var(--success-color); color: white; padding: 4px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; }
        
        .single-label-preview {
            background: white; border: 1px solid #ccc; padding: 25px; width: fit-content;
            margin: 0 auto; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 8px;
        }

        .preview-text {
            font-family: 'Microsoft JhengHei', sans-serif;
            font-size: 18px; font-weight: 900; line-height: 1.2; color: black;
        }

        .error-message {
            color: var(--danger-color); background-color: #f8d7da; border: 1px solid #f5c6cb;
            padding: 12px; border-radius: 4px; margin-top: 10px; display: none; font-weight: bold;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* ==========================================================================
           3. A4 列印矩陣樣式 (滿版 A4、無虛線、14x4 完美置中)
           ========================================================================== */
        #printArea {
            display: none;
        }

        @media print {
            @page {
                size: A4 portrait;
                margin: 0; /* 強制移除所有邊界印表機白邊 */
            }

            body { background-color: white; padding: 0; margin: 0; }
            .app-container { display: none !important; }

            #printArea, #printArea * { visibility: visible; }

            #printArea {
                display: grid;
                /* 4 欄 14 列，平均分配 100% 空間 */
                grid-template-columns: repeat(4, 1fr);
                grid-template-rows: repeat(14, 1fr);
                gap: 0; /* 移除任何間距，滿版切割 */
                width: 210mm; /* A4 實際寬度 */
                height: 297mm; /* A4 實際高度 */
                position: absolute;
                top: 0; left: 0;
            }

            .label-cell {
                display: flex;
                flex-direction: column;
                justify-content: center; /* 垂直置中 */
                align-items: center;     /* 水平置中 */
                width: 100%;
                height: 100%;
                background-color: white;
                border: none; /* 移除虛線 */
                box-sizing: border-box;
                padding: 2mm; /* 稍微內縮避免文字貼到物理裁切線 */
            }

            .print-text-line {
                font-family: 'Microsoft JhengHei', sans-serif;
                font-size: 13px; /* 無條碼後空間變大，字體可適度放大 */
                font-weight: 900;
                line-height: 1.5;
                color: black;
                text-align: center;
                white-space: nowrap;
            }
        }
    </style>
</head>
<body>

    <!-- 系統主介面 -->
    <div class="app-container">
        <div class="header-section">
            <h1>SICU 護理標籤智慧排版系統</h1>
            <p>將護理資訊系統 (NIS) 的文字資料貼入下方，系統將自動萃取關鍵資訊，並生成滿版無邊框的 56 格 A4 標籤供列印使用。</p>
        </div>

        <div class="input-group">
            <label for="inputText">請貼上病人資訊 (Raw Data)</label>
            <textarea id="inputText" spellcheck="false">
01234567 劉秉勳
床號： SIU28
ID： A123456780
生日： 2000-08-15, 民國90年08月05日
81 years old male
血型： A , RH+ (2026/02/26)
首次就診日期：2014-08-24，</textarea>
            <div id="errorMsg" class="error-message"></div>
        </div>

        <div class="action-panel">
            <button class="btn-convert" onclick="processData()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"></polyline><polyline points="20 10 14 10 14 4"></polyline><line x1="14" y1="10" x2="21" y2="3"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>
                解析與轉換
            </button>
            <button class="btn-print" id="printBtn" onclick="triggerPrint()" disabled>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                列印 56 格 A4 標籤
            </button>
        </div>

        <div class="preview-section" id="previewBox">
            <div class="preview-header">
                <h3>臨床標籤預覽 (Preview)</h3>
                <span class="status-badge">解析成功</span>
            </div>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 15px; text-align: center;">請確認下方資料正確無誤，排版已設定為雙行置中。</p>
            
            <div class="single-label-preview">
                <div id="previewText1" class="preview-text"></div>
                <div id="previewText2" class="preview-text"></div>
            </div>
        </div>
    </div>

    <!-- 列印專用隱藏區塊 (56 格矩陣) -->
    <div id="printArea"></div>

    <script>
        /**
         * ==========================================================================
         * Cell 1: 系統核心邏輯 (資料解析)
         * ==========================================================================
         */
        function extractPatientData(rawText) {
            console.log("[Cell 1 執行] 開始解析輸入文字...");
            const result = { mrn: "", name: "", bed: "", idNumber: "", dob: "", isValid: false };

            try {
                const lines = rawText.split('\n').map(line => line.trim());
                if (lines.length === 0) throw new Error("輸入欄位為空");

                // 1. 萃取第一行: 病歷號與姓名
                const firstLineParts = lines[0].split(/\s+/);
                if (firstLineParts.length >= 2) {
                    result.mrn = firstLineParts[0];
                    result.name = firstLineParts[1];
                }

                // 2. 萃取床號
                const bedMatch = rawText.match(/床號[：:]\s*([A-Za-z0-9]+)/);
                if (bedMatch) result.bed = bedMatch[1];

                // 3. 萃取身分證字號
                const idMatch = rawText.match(/ID[：:]\s*([A-Za-z0-9]+)/);
                if (idMatch) result.idNumber = idMatch[1];

                // 4. 萃取民國生日
                const dobMatch = rawText.match(/民國(\d{1,3})年(\d{1,2})月(\d{1,2})日/);
                if (dobMatch) {
                    const yy = dobMatch[1].padStart(2, '0');
                    const mm = dobMatch[2].padStart(2, '0');
                    const dd = dobMatch[3].padStart(2, '0');
                    result.dob = `${yy}/${mm}/${dd}`;
                }

                // 驗證
                if (result.mrn && result.name) {
                    result.isValid = true;
                    console.log(`[Cell 1 成功] 資料萃取完成: ${result.mrn} ${result.name}`);
                }
                return result;
            } catch (error) {
                console.error("[Cell 1 錯誤] 解析異常:", error);
                return result;
            }
        }

        /**
         * ==========================================================================
         * Cell 2: 資料處理與預覽畫面渲染
         * ==========================================================================
         */
        function processData() {
            console.log("[Cell 2 執行] 啟動轉換程序...");
            const rawText = document.getElementById('inputText').value;
            const errorMsgBox = document.getElementById('errorMsg');
            const previewBox = document.getElementById('previewBox');
            const printBtn = document.getElementById('printBtn');

            // 狀態重置
            errorMsgBox.style.display = 'none';
            previewBox.style.display = 'none';
            printBtn.disabled = true;

            const data = extractPatientData(rawText);

            if (!data.isValid) {
                errorMsgBox.innerText = "資料解析失敗：無法辨識首行的「病歷號」與「姓名」。請確認貼上的格式是否正確。";
                errorMsgBox.style.display = 'block';
                return;
            }

            // 排版字串 (使用全形空格或 nbsp 調整間距)
            const line1Str = `${data.mrn} &nbsp; ${data.name} &nbsp; ${data.dob}`;
            const line2Str = `${data.bed} &nbsp;&nbsp;&nbsp; ${data.idNumber}`;

            // 渲染螢幕預覽
            document.getElementById('previewText1').innerHTML = line1Str;
            document.getElementById('previewText2').innerHTML = line2Str;
            previewBox.style.display = 'block';

            // 呼叫 Cell 3 建立列印陣列
            buildPrintGrid(line1Str, line2Str);

            printBtn.disabled = false;
            console.log("[Cell 2 成功] 預覽區塊與列印按鈕已就緒。");
        }

        /**
         * ==========================================================================
         * Cell 3: 建立 56 格滿版列印矩陣
         * ==========================================================================
         */
        function buildPrintGrid(line1, line2) {
            console.log("[Cell 3 執行] 正在建構 14x4 滿版 A4 列印網格...");
            const printArea = document.getElementById('printArea');
            printArea.innerHTML = ""; 

            const totalCells = 14 * 4; // 56 格
            const fragment = document.createDocumentFragment();

            for (let i = 0; i < totalCells; i++) {
                const cell = document.createElement('div');
                cell.className = 'label-cell';
                
                const textDiv1 = document.createElement('div');
                textDiv1.className = 'print-text-line';
                textDiv1.innerHTML = line1;
                
                const textDiv2 = document.createElement('div');
                textDiv2.className = 'print-text-line';
                textDiv2.innerHTML = line2;
                
                cell.appendChild(textDiv1);
                cell.appendChild(textDiv2);
                fragment.appendChild(cell);
            }

            printArea.appendChild(fragment);
            console.log("[Cell 3 成功] 56 格 DOM 元素建構完畢！");
        }

        /**
         * 呼叫作業系統列印
         */
        function triggerPrint() {
            console.log("[系統] 觸發列印功能...");
            window.print();
        }
    </script>
</body>
</html>
